<!DOCTYPE html>
<html>
<head>
    <title>Recent Data</title>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
    <link rel="shortcut icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
    <script src="{% static 'js/echarts.min.js' %}"></script>
    <style>
        /* 设置图表容器的宽度和高度为相对单位 */
        #chart {
            width: 100%;
            height: 80vh; /* 视口高度 */
        }
    </style>
</head>
<body>
    <h1>Recent Data</h1>
    {% if not symbols %}
    <p>No data available yet. Run first-time collection command in README, then refresh this page.</p>
    {% endif %}
    <form id="recent-form">
        <label for="symbol">Currency Pair:</label>
        <select id="symbol" name="symbol" onchange="loadChart()">
            <!-- Add your currency pairs here -->
            {% for symbol in symbols %}
                <option value="{{ symbol }}" {% if symbol == default_symbol %}selected{% endif %}>{{ symbol }}</option>
            {% endfor %}
        </select>
        <select id="time_range" name="time_range" onchange="loadChart()">
            <option value="1d">1 Day</option>
            <option value="3d">3 Days</option>
            <option value="1w" selected>1 Week</option>
            <option value="1m">1 Month</option>
        </select>
    </form>
    <div id="chart"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadChart();  // 页面加载时自动加载图表
        });

        function loadChart() {
            var symbol = document.getElementById('symbol').value;
            if (!symbol) {
                return;
            }
            var time_range = document.getElementById('time_range').value;
            var url = `/visual/get_recent_chart/?symbol=${symbol}&time_range=${time_range}`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    var chart = echarts.init(document.getElementById('chart'));
                    chart.setOption(JSON.parse(data));
                });
        }
    </script>
</body>
</html>
